<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tropa do Abílio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fff0f5;
      color: #333;
      overflow: hidden;
    }

    header {
      text-align: center;
      background: linear-gradient(135deg, #0B20A9, #4FAD08);
      padding: 40px 20px;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 700;
    }

    header p {
      margin-top: 5px;
      font-weight: 300;
    }

    .kits {
      padding: 30px;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 20px;
    }

    .whatsapp {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 30px;
    }

    .insta {
      margin-top: 15px;
    }

    .insta a {
      color: #ff4d88;
      text-decoration: none;
    }

    .direitos {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    /* EMOJIS */
    .emoji {
      position: fixed;
      font-size: 30px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

<header>
  <h1>TDA</h1>
  <p>Venha com a tropa do abilio</p>
</header>

<section class="kits">
  <h2>O Abílio é um cara tranquilo e inteligente, seja como ele, peça conselhos com os contatos abaixo</h2>

  <img src="https://cdn.discordapp.com/attachments/1498423400077463743/1498423615941513319/20260414_113021.jpg" 
       alt="Foto do Abílio" 
       style="max-width:300px; border-radius:15px; margin-top:20px;">
</section>

<footer>
  <a href="https://wa.me/558592888250?text=Olá%2C%20abilio%20voce%20é%20legal%20demais" class="whatsapp">
    Fale no WhatsApp
  </a>

  <div class="insta">
    Instagram:
    <a href="https://instagram.com/emersonabilio532" target="_blank">
      Abílio Lenda
    </a>
  </div>

  <div class="direitos">
    © 2026 Abilio - Todos os direitos reservados
  </div>
</footer>

<script>
  const emojis = ["🍌", "🥒", "🍆"];

  function criarEmoji() {
    const el = document.createElement("div");
    el.className = "emoji";
    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    document.body.appendChild(el);

    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;

    let dx = (Math.random() - 0.5) * 4;
    let dy = (Math.random() - 0.5) * 4;

    function mover() {
      x += dx;
      y += dy;

      if (x < 0 || x > window.innerWidth) dx *= -1;
      if (y < 0 || y > window.innerHeight) dy *= -1;

      el.style.left = x + "px";
      el.style.top = y + "px";

      requestAnimationFrame(mover);
    }

    mover();
  }

  // quantidade de emojis na tela
  for (let i = 0; i < 10; i++) {
    criarEmoji();
  }
</script>

</body>
</html>
